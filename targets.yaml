# Camera parameters – resolution, framerate, bitrate, encoder type.
# IMU settings – sample rate, filter coefficients, calibration file
# paths.
# Network settings – local bind address, multicast groups, QoS.
# Device paths – e.g. /dev/i2c-1 or GPIO pins for LEDs.
# Node identifiers – numeric ID or name for logging/diagnostics.
# Feature toggles – enable/disable video, IMU, debugging output, etc.
# Security – encryption keys, authentication tokens.