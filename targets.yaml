global:
  base:
    LAN_IP: 192.168.1.9


targets:
  # - name: pi1
  #   host: walker@raspberrypi
  #   LAN_IP: 192.168.1.10
  #   path: "~/buoy/"
  #   video_port: 5101
  #   imu_port: 5001
  - name: mola1
    host: walker@192.168.1.20
    LAN_IP: 192.168.1.20
    path: "~/buoy/"
    imu_port: 5001
    cameras:
        - name: front
          path: "/base/soc/i2c0mux/i2c@0/imx708@1a"
          video_port: 5101
          metadata_port: 5301
          mount: front
          layout: {x: 0, y: 0, width: 1920, height: 1080}

        - name: rear
          path: "/base/soc/i2c0mux/i2c@1/imx708@1a"
          video_port: 5201
          metadata_port: 5401
          mount: rear_yaw_180
          layout: {x: 0, y: 1080, width: 1920, height: 1080}
  # - name: mola2
  #   host: walker@192.168.1.21
  #   LAN_IP: 192.168.1.21
  #   path: "~/buoy/"
  #   video_port: 5102
  #   video2_port: 5202
  #   imu_port: 5002
  - name: mola3
    host: walker@192.168.1.22
    LAN_IP: 192.168.1.22
    path: "~/buoy/"
    imu_port: 5003
    cameras:
        - name: front
          path: "/base/soc/i2c0mux/i2c@0/imx708@1a"
          video_port: 5103
          metadata_port: 5303
          mount: front
          layout: {x: 1920, y: 0, width: 1920, height: 1080}
        - name: rear
          path: "/base/soc/i2c0mux/i2c@1/imx708@1a"
          video_port: 5203
          metadata_port: 5403
          mount: rear_yaw_180
          layout: {x: 1920, y: 1080, width: 1920, height: 1080}

        # - name: rear
        #   path: "/base/soc/i2c0mux/i2c@1/imx708@1a"
        #   video_port: 5201
        #   metadata_port: 5401
        #   mount: rear_yaw_180
        #   layout: {x: 0, y: 1080, width: 1920, height: 1080}

# Camera parameters – resolution, framerate, bitrate, encoder type.
# IMU settings – sample rate, filter coefficients, calibration file
# paths.
# Network settings – local bind address, multicast groups, QoS.
# Device paths – e.g. /dev/i2c-1 or GPIO pins for LEDs.
# Node identifiers – numeric ID or name for logging/diagnostics.
# Feature toggles – enable/disable video, IMU, debugging output, etc.
# Security – encryption keys, authentication tokens.